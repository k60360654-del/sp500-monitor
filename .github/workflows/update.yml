name: Update SP500 Signals

on:
  schedule:
    # Every 8 hours. Pipeline now does Form 4 + 8-K + NT + 13D/G + XBRL financials,
    # which is more API calls per company. 8 hours gives plenty of headroom.
    - cron: '15 */8 * * *'
  workflow_dispatch:
    inputs:
      max_companies:
        description: 'Limit universe size (0 = full S&P 500)'
        required: false
        default: '0'
      backfill_years:
        description: 'Years of Form 4 history to backfill on first run'
        required: false
        default: '1'
      skip_13dg:
        description: 'Skip 13D/G fetching (much faster; recommended for first run)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "sp500-monitor"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 5h50m - just under the 6h hard cap
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          MAX_COMPANIES="${{ github.event.inputs.max_companies || '0' }}"
          BACKFILL_YEARS="${{ github.event.inputs.backfill_years || '1' }}"
          SKIP_13DG_FLAG=""
          if [ "${{ github.event.inputs.skip_13dg }}" = "true" ] || [ -z "${{ github.event.inputs.skip_13dg }}" ]; then
            SKIP_13DG_FLAG="--skip-13dg"
          fi
          python -m src.pipeline \
            --max-companies "$MAX_COMPANIES" \
            --backfill-years "$BACKFILL_YEARS" \
            $SKIP_13DG_FLAG
      - name: Copy data into dashboard dir for Pages
        run: |
          cp data/companies.json dashboard/companies.json
          cp data/universe.json dashboard/universe.json || true
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/companies.json dashboard/universe.json || true
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: scheduled update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
